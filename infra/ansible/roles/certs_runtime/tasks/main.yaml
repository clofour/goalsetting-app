---

- name: Create certificate directories
  ansible.builtin.file:
    path: "{{ certificate_target_dir }}/{{ item.name }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - name: "{{ public_cert_dir }}"
      group: root
      mode: "0755"
    - name: "{{ private_key_dir }}"
      group: "{{ certs_runtime_group }}"
      mode: "0750"

- name: Install certificates
  ansible.builtin.copy:
    src: "{{ certificate_source_dir }}/{{ item }}.crt"
    dest: "{{ certificate_target_dir }}/{{ public_cert_dir }}/{{ item }}.crt"
    owner: root
    group: root
    mode: "0644"
  loop:
    - "{{ root_crt_name }}"
    - "{{ ansible_crt_name }}"
    - "{{ chain_crt_name }}"

- name: Create CA trust directory
  ansible.builtin.file:
    path: "{{ system_trust_dir }}/{{ app_trust_name }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install root CA into system trust store
  ansible.builtin.copy:
    src: "{{ certificate_source_dir }}/{{ root_crt_name }}.crt"
    dest: "{{ system_trust_dir }}/{{ app_trust_name }}/{{ root_crt_name }}.crt"
    owner: root
    group: root
    mode: "0644"
  notify: Update system trust store

- name: Create service private key
  community.crypto.openssl_privatekey:
    path: "{{ certificate_target_dir }}/{{ private_key_dir }}/{{ service_name }}.key"
    type: RSA
    size: 2048
    owner: root
    group: "{{ certs_runtime_group }}"
    mode: "0640"

- name: Create service CSR
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ certificate_target_dir }}/{{ private_key_dir }}/{{ service_name }}.key"
    common_name: "{{ certs_runtime_common_name }}"
    subject_alt_name: "{{ certs_runtime_sans }}"
    key_usage:
      - digitalSignature
      - keyEncipherment
    extended_key_usage: "{{ certs_runtime_extended_key_usage }}"
    basic_constraints:
      - "CA:FALSE"
    basic_constraints_critical: true
  register: csr

- name: Get existing certificate contents
  ansible.builtin.slurp:
    src: "{{ certificate_target_dir }}/{{ public_cert_dir }}/{{ service_name }}.crt"
  register: service_crt_content

- name: Sign service certificate with Ansible CA
  community.crypto.x509_certificate_pipe:
    content: "{{ service_crt_content.content | b64decode }}"
    csr_content: "{{ csr.csr }}"
    provider: ownca
    ownca_path: "{{ certificate_source_dir }}/{{ ansible_crt_name }}.crt"
    ownca_privatekey_path: "{{ certificate_source_dir }}/{{ ansible_crt_name }}.key"
    ownca_not_before: "-1d"
    ownca_not_after: "+365d"
  delegate_to: localhost
  register: signed_service_crt

- name: Install service certificate
  ansible.builtin.copy:
    content: "{{ signed_service_crt.certificate }}"
    dest: "{{ certificate_target_dir }}/{{ public_cert_dir }}/{{ service_name }}.crt"
    owner: root
    group: root
    mode: "0644"

