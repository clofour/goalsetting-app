---

- name: Run backend container
  community.docker.docker_container:
    name: backend
    image: "{{ backend_runtime_image }}"
    published_ports:
      - 80:8080
    env:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server={{ dbproxy_runtime_host }};Port={{ dbproxy_runtime_port }};Database={{ dbproxy_runtime_database }};User Id={{ dbproxy_runtime_user }};Password={{ dbproxy_runtime_password }}"
    state: started
  no_log: true
