---

- name: Create etcd extraction directory
  ansible.builtin.file:
    path: /tmp/etcd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Extract etcd
  ansible.builtin.unarchive:
    remote_src: true
    src: /tmp/etcd.tar.gz
    dest: /tmp/etcd
    owner: root
    group: root
    extra_opts:
      - --strip-components=1
      - --show-stored-names

- name: Install etcd
  ansible.builtin.copy:
    remote_src: true
    src: /tmp/etcd/{{ item }}
    dest: "{{ etcd_dir }}/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - etcd
    - etcdctl
    - etcdutl

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
